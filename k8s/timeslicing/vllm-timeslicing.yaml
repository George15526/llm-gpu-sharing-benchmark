# k8s/vllm-timeslicing.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-timeslicing
  labels:
    app: vllm
    mode: timeslicing
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm
      mode: timeslicing
  template:
    metadata:
      labels:
        app: vllm
        mode: timeslicing
    spec:
      runtimeClassName: nvidia
      containers:
      - name: vllm
        image: vllm/vllm-openai:v0.8.5
        ports:
        - containerPort: 8000
        readinessProbe:
          httpGet:
            path: /v1/models
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 5
          timeoutSeconds: 2
          failureThreshold: 60
        env:
        - name: HF_HOME
          value: /models
        # - name: NVIDIA_VISIBLE_DEVICES
        #   value: all
        command:
        - bash
        - -lc
        - |
          python3 -m vllm.entrypoints.openai.api_server \
            --host 0.0.0.0 \
            --port 8000 \
            --model Qwen/Qwen2.5-0.5B-Instruct \
            --dtype half \
            --max-model-len 2048 \
            --max-num-seqs 1 \
            --gpu-memory-utilization 0.35
        resources:
          limits:
            nvidia.com/gpu: 1
        volumeMounts:
        - name: model-cache
          mountPath: /models
      volumes:
      - name: model-cache
        hostPath:
          path: /data/hf-cache
          type: DirectoryOrCreate
